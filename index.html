<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC News</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            color: #d4d4d4;
            padding: 40px 20px;
            line-height: 1.6;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #00ff41;
            text-shadow: 0 0 10px rgba(0,255,65,0.3);
            margin-bottom: 30px;
        }
        .timestamp {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        a {
            color: #3794ff;
            text-decoration: none;
        }
        a:hover {
            color: #5aafff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📰 HC News</h1>
        <div class="timestamp">Updated: <span id="update-time"></span></div>
        <pre id="content"></pre>
    </div>
    <script>
        document.getElementById('update-time').textContent = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
        document.getElementById('content').textContent = `EOF

# Escape content for safe HTML display
python3 << 'PYTHON'
import sys
import html
with open('news_output.txt', 'r', encoding='utf-8') as f:
    content = f.read()
print(html.escape(content))
PYTHON

cat >> public/index.html <<'EOF'
        `;
    </script>
</body>
</html>
